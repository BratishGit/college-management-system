spring.application.name=backend

# MySQL Database Configuration (Target)
custom.datasource.mysql.url=jdbc:mysql://localhost:3306/srms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
custom.datasource.mysql.username=root
custom.datasource.mysql.password=Your_Password

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
# WARNING: Disable show-sql in production to prevent data leakage
spring.jpa.show-sql=true

# H2 Console (Will be active if fallback is triggered)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# SQL Init
spring.sql.init.mode=always

# JWT Config
# PRODUCTION: Externalize via environment variable: JWT_SECRET
jwt.secret=${JWT_SECRET:9a6747134644847e35b71db3d70638563f69cf32738fb2d880460026e6e22c9c}
jwt.expiration=${JWT_EXPIRATION:86400000}

server.port=8080
